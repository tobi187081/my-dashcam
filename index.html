<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo AI Dashcam</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; position: absolute; }
        #canvasOverlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 20; }
        .badge { background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; border: 1px solid #444; }
        .alarm { background: rgba(255, 0, 0, 0.9) !important; border: 2px solid #fff; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvasOverlay"></canvas>
    
    <div id="ui">
        <div id="status" class="badge">INITIALISIERUNG...</div>
    </div>

    <script>
        const WATCHLIST = ["BMW123", "HHRS567", "MXY999", "TEST", "ABC"];
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvasOverlay');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        let worker = null;
        let isProcessing = false;

        async function init() {
            // 1. Kamera-Stream in hoher Auflösung für die Anzeige
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            video.srcObject = stream;

            // 2. Tesseract Worker einmalig im Hintergrund laden (spart Zeit!)
            status.innerText = "KI-MODUL LÄDT...";
            worker = await Tesseract.createWorker('deu'); // Deutsch für Kennzeichen-Logik
            
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                status.innerText = "ECHTZEIT-SCANNER AKTIV";
                scan();
            };
        }

        async function scan() {
            if (isProcessing) return;
            isProcessing = true;

            // Wir erstellen ein verkleinertes Bild für die KI (Viel schneller!)
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = video.videoWidth / 2;
            tempCanvas.height = video.videoHeight / 2;
            tCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

            // Erkennung starten
            const { data: { words } } = await worker.recognize(tempCanvas);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let matchFound = false;

            words.forEach(w => {
                const txt = w.text.toUpperCase().replace(/[^A-Z0-9]/g, "");
                if (txt.length > 3) {
                    // Rahmen skalieren, da wir auf dem kleinen Canvas gescannt haben
                    const x = w.bbox.x0 * 2;
                    const y = w.bbox.y0 * 2;
                    const width = (w.bbox.x1 - w.bbox.x0) * 2;
                    const height = (w.bbox.y1 - w.bbox.y0) * 2;

                    let hit = false;
                    WATCHLIST.forEach(p => { if (txt.includes(p)) hit = true; });

                    // Zeichnen
                    ctx.lineWidth = 6;
                    ctx.strokeStyle = hit ? "#00FF00" : "#FF0000";
                    ctx.strokeRect(x, y, width, height);

                    if (hit) {
                        matchFound = true;
                        triggerAlarm(txt);
                    }
                }
            });

            if (!matchFound) {
                status.classList.remove('alarm');
                if (!status.innerText.includes("SCANNER")) status.innerText = "ECHTZEIT-SCANNER AKTIV";
            }

            isProcessing = false;
            // Sofort den nächsten Frame anfordern (Echtzeit-Loop)
            requestAnimationFrame(scan);
        }

        function triggerAlarm(plate) {
            status.innerText = "!!! TREFFER: " + plate + " !!!";
            status.classList.add('alarm');
            
            // Sound & Sprache (nur wenn Nutzer einmal geklickt hat)
            const speech = new SpeechSynthesisUtterance("Achtung, Kennzeichen " + plate);
            speech.lang = 'de-DE';
            speech.rate = 1.2;
            window.speechSynthesis.speak(speech);
        }

        window.onclick = () => { init(); }; // Startet beim ersten Tap
        status.innerText = "BITTE EINMAL TIPPEN ZUM STARTEN";
    </script>
</body>
</html>
