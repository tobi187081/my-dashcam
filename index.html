<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Dashcam Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; overflow: hidden; }
        #video { width: 100vw; height: 100vh; object-fit: cover; }
        #overlay { position: absolute; top: 20px; left: 0; width: 100%; text-align: center; pointer-events: none; }
        .status { background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; display: inline-block; }
        #log { position: absolute; bottom: 20px; left: 10px; right: 10px; max-height: 150px; overflow-y: auto; font-size: 12px; background: rgba(0,0,0,0.5); }
        .match { color: #00ff00; font-weight: bold; font-size: 1.2em; border: 2px solid #00ff00; padding: 10px; background: rgba(0,255,0,0.2); }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    
    <div id="overlay">
        <div id="status-box" class="status">Kamera wird gestartet...</div>
    </div>

    <div id="log"></div>

    <script>
        // --- DEINE WATCHLIST ---
        const WATCHLIST = ["HBDE598", "HHRS567", "MXY999", "TEST"];
        
        const video = document.getElementById('video');
        const statusBox = document.getElementById('status-box');
        const log = document.getElementById('log');

        // Kamera aktivieren
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                statusBox.innerText = "Scanner aktiv - Suche nach Kennzeichen...";
                processFrame();
            } catch (err) {
                statusBox.innerText = "Fehler: Kamerazugriff verweigert!";
            }
        }

        // KI-Verarbeitung (OCR)
        async function processFrame() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            const loop = async () => {
                // Aktuelles Bild aus Video ziehen
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // OCR Analyse starten
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
                    // Schneller Modus für einzelne Zeilen
                });

                const cleanText = text.toUpperCase().replace(/[^A-Z0-9]/g, "");
                
                if (cleanText.length > 3) {
                    updateLog(`Gescant: ${cleanText}`);
                    
                    WATCHLIST.forEach(plate => {
                        if (cleanText.includes(plate)) {
                            triggerAlarm(plate);
                        }
                    });
                }

                // Nächster Scan nach kurzer Pause
                setTimeout(loop, 1000); 
            };
            loop();
        }

        function triggerAlarm(plate) {
            statusBox.innerHTML = `<div class="match">!!! TREFFER: ${plate} !!!</div>`;
            
            // Sprachausgabe (iOS kompatibel)
            const msg = new SpeechSynthesisUtterance(`Achtung, Kennzeichen ${plate} erkannt`);
            msg.lang = 'de-DE';
            window.speechSynthesis.speak(msg);

            // Nach 5 Sek zurücksetzen
            setTimeout(() => {
                statusBox.innerHTML = `<div class="status">Scanner aktiv...</div>`;
            }, 5000);
        }

        function updateLog(msg) {
            const entry = document.createElement('div');
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.prepend(entry);
        }

        // Start beim Laden
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
